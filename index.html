<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.card {
    background: #111;
    border-radius: 20px;
    padding: 30px;
    width: 370px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,0,0,0.2);
}

h2 {
    font-size: 22px;
    margin-bottom: 10px;
}

.live {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 15px;
}

.live span {
    color: #ff3b3b;
    font-weight: bold;
}

.main-btn {
    margin-top: 12px;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 15px;
    color: white;
    cursor: pointer;
    background: linear-gradient(45deg, red, orange);
    box-shadow: 0 5px 20px rgba(255,0,0,0.5);
    transition: all 0.25s ease;
}

/* Hover */
.main-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(255,0,0,0.8);
}

/* Click */
.main-btn:active {
    transform: scale(0.96);
}
</style>
</head>

<body>

<div class="card">

    <h2></h2>

    <div class="live">
        🔴 <span id="viewer">1.284</span> people watching now
    </div>

    <button class="main-btn" onclick="redirect(1)">PLAY VIDEO NOW</button>
    <button class="main-btn" onclick="redirect(2)">ALTERNATIVE</button>
    <button class="main-btn" onclick="redirect(3)">ALTERNATIVE 2</button>
    <button class="main-btn" onclick="redirect(4)">GROUP</button>

</div>

<script>

/* REDIRECT (SIMPLE) */
function redirect(type) {
    const links = {
        1: "https://x-hubb.github.io/H4b5/",
        2: "https://rungbeacon.com/wihbb85w?key=00584323454ed6c4c1f322904a45a436",
        3: "https://videy.co/v/?id=cIbDEANk1",
        4: "https://www.facebook.com/groups/1405015587511712?locale=id_ID"
    };
    window.location.href = links[type];
}

/* FAKE VIEWER COUNTER */
setInterval(() => {
    let el = document.getElementById("viewer");
    let num = parseInt(el.innerText.replace(".", ""));
    num += Math.floor(Math.random() * 5);
    el.innerText = num.toLocaleString("id-ID");
}, 3000);

</script>
